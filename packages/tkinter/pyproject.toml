[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "visual-assault-tkinter"
version = "0.1.0"
description = "Loud, deliberately eye-searing themes for Tkinter/ttk apps. Generated from themes/THEMES.md."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
dependencies = []

[project.urls]
Repository = "https://github.com/gerp93/VisualAssault"

[tool.setuptools.packages.find]
include = ["visual_assault_tkinter*"]
